<!DOCTYPE html>
<html>
<head><title>Drive Auth</title></head>
<body>
<script>
// Parse token from URL hash (implicit flow)
const params = new URLSearchParams(window.location.hash.substring(1));
const token = params.get('access_token');
const expiresIn = parseInt(params.get('expires_in') || '3600');
const error = params.get('error');

if (token) {
  // Send token back to parent window
  if (window.opener) {
    window.opener.postMessage({ type: 'drive_token', token, expires_in: expiresIn }, 'https://arpitsantoki-afk.github.io');
    window.close();
  }
} else if (error) {
  if (window.opener) {
    window.opener.postMessage({ type: 'drive_error', error }, 'https://arpitsantoki-afk.github.io');
    window.close();
  }
} else {
  document.body.innerHTML = '<p style="font-family:sans-serif;padding:20px">Authenticating...</p>';
}
</script>
</body>
</html>
