<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BlueDoor Accounts</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0d0f14; --card: #161920; --border: #232630;
    --accent: #4f8ef7; --text: #e2e8f0; --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  .box {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 36px 28px; width: 100%; max-width: 380px; text-align: center;
  }

  .logo { font-size: 48px; margin-bottom: 12px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .sub { color: var(--muted); font-size: 13px; margin-bottom: 32px; }

  /* Google button container */
  #g-btn-wrap {
    display: flex; justify-content: center; margin-bottom: 20px;
  }

  .divider {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    color: var(--muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Manual login fallback */
  #manual-form { display: none; }
  .field { margin-bottom: 12px; text-align: left; }
  .field label { display: block; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
  .field input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 11px 14px; border-radius: 9px; font-size: 14px; outline: none; transition: border .15s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-manual {
    width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none;
    border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px;
    transition: background .15s;
  }
  .btn-manual:active { background: #3b7de8; }
  .toggle-link { font-size: 12px; color: var(--accent); cursor: pointer; text-decoration: underline; }

  /* Status */
  #status {
    min-height: 44px; display: flex; align-items: center; justify-content: center;
    font-size: 13px; gap: 8px;
  }
  .spin {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .err { color: #ef4444; font-size: 13px; }
  .ok { color: #22c55e; }

  .version { font-size: 11px; color: var(--muted); margin-top: 24px; }
</style>
</head>
<body>

<div class="box">
  <div class="logo">🔷</div>
  <h1>BlueDoor Accounts</h1>
  <p class="sub">V3 — Interior Design Finance</p>

  <!-- Google Sign-In button -->
  <div id="g-btn-wrap">
    <div id="g_id_onload"
      data-client_id="449634347678-tkbk083eu1igcil0rq58tgvdrs54l4nm.apps.googleusercontent.com"
      data-callback="onGoogleLogin"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-shape="pill"
      data-theme="filled_black"
      data-text="signin_with"
      data-size="large"
      data-logo_alignment="left"
      data-width="280">
    </div>
  </div>

  <!-- Status / spinner -->
  <div id="status"></div>

  <!-- Manual login fallback -->
  <div class="divider">or use password</div>
  <div id="manual-form">
    <div class="field"><label>Username</label><input id="mu" placeholder="Arpit"></div>
    <div class="field"><label>Password</label><input id="mp" type="password" placeholder="••••••••"></div>
    <button class="btn-manual" onclick="manualLogin()">Sign In</button>
  </div>
  <span class="toggle-link" onclick="toggleManual()">Sign in with username & password</span>

  <p class="version">BlueDoor Accounts V3</p>
</div>

<script>
const API = 'https://bluedoor-accounts.info-unikraft.workers.dev/api';

function setStatus(msg, type='') {
  const el = document.getElementById('status');
  if (type === 'loading') el.innerHTML = `<span class="spin"></span> ${msg}`;
  else if (type === 'err') el.innerHTML = `<span class="err">⚠ ${msg}</span>`;
  else if (type === 'ok') el.innerHTML = `<span class="ok">✓ ${msg}</span>`;
  else el.innerHTML = msg;
}

// ── Google callback ───────────────────────────────────────────────────────────
async function onGoogleLogin(response) {
  setStatus('Signing in...', 'loading');
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'googleLogin', id_token: response.credential })
    });
    const data = await res.json();
    if (!data.ok) { setStatus(data.error || 'Login failed', 'err'); return; }
    handleSuccess(data);
  } catch (e) {
    setStatus('Network error: ' + e.message, 'err');
  }
}

// ── Manual login ──────────────────────────────────────────────────────────────
async function manualLogin() {
  const u = document.getElementById('mu').value.trim();
  const p = document.getElementById('mp').value;
  if (!u || !p) { setStatus('Enter username and password', 'err'); return; }
  setStatus('Signing in...', 'loading');
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'login', username: u, password: p })
    });
    const data = await res.json();
    if (!data.ok) { setStatus(data.error || 'Invalid credentials', 'err'); return; }
    handleSuccess(data);
  } catch (e) {
    setStatus('Network error: ' + e.message, 'err');
  }
}
document.getElementById('mp')?.addEventListener('keydown', e => { if (e.key === 'Enter') manualLogin(); });

// ── Post-login redirect ───────────────────────────────────────────────────────
function handleSuccess(data) {
  // Store session
  sessionStorage.setItem('bd_token', data.token);
  sessionStorage.setItem('bd_user', JSON.stringify(data.user));

  setStatus('Welcome, ' + data.user.username + '!', 'ok');

  // Redirect based on role
  const role = data.user.role;
  setTimeout(() => {
    if (role === 'Admin') {
      window.location.href = 'admin.html';
    } else {
      window.location.href = 'app.html';
    }
  }, 600);
}

// ── Toggle manual form ────────────────────────────────────────────────────────
function toggleManual() {
  const f = document.getElementById('manual-form');
  const showing = f.style.display === 'block';
  f.style.display = showing ? 'none' : 'block';
  document.querySelector('.toggle-link').textContent = showing
    ? 'Sign in with username & password'
    : 'Hide manual login';
}

// ── Auto-login if session exists ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const token = sessionStorage.getItem('bd_token');
  const user = sessionStorage.getItem('bd_user');
  if (token && user) {
    try {
      const u = JSON.parse(user);
      // Verify session is still valid
      fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
        body: JSON.stringify({ action: 'getMe' })
      }).then(r => r.json()).then(data => {
        if (data.ok) {
          setStatus('Restoring session...', 'loading');
          setTimeout(() => {
            window.location.href = u.role === 'Admin' ? 'admin.html' : 'app.html';
          }, 400);
        }
      }).catch(() => {});
    } catch(e) {}
  }
});
</script>
</body>
</html>
