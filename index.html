<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BlueDoor Accounts</title>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
  :root { --bg:#0d0f14; --card:#161920; --border:#232630; --accent:#4f8ef7; --text:#e2e8f0; --muted:#64748b; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:36px 28px;width:100%;max-width:380px;text-align:center}
  .logo{font-size:48px;margin-bottom:12px}
  h1{font-size:22px;font-weight:700;margin-bottom:4px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:28px}
  #g-wrap{display:flex;justify-content:center;margin-bottom:16px;min-height:44px}
  #status{min-height:36px;display:flex;align-items:center;justify-content:center;font-size:13px;gap:8px;margin-bottom:8px}
  .divider{display:flex;align-items:center;gap:12px;margin:12px 0;color:var(--muted);font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
  .field{margin-bottom:12px;text-align:left}
  .field label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .field input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
    padding:11px 14px;border-radius:9px;font-size:14px;outline:none;transition:border .15s}
  .field input:focus{border-color:var(--accent)}
  .btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;
    border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
  .toggle{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline;display:block;margin-top:12px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--border);
    border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{color:#ef4444}.ok{color:#22c55e}
  #manual{display:none}
  .version{font-size:11px;color:var(--muted);margin-top:20px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">&#x1F537;</div>
  <h1>BlueDoor Accounts</h1>
  <p class="sub">V3 &mdash; Interior Design Finance</p>

  <div id="g-wrap">
    <div id="g_id_onload"
      data-client_id="449634347678-tkbk083eu1igcil0rq58tgvdrs54l4nm.apps.googleusercontent.com"
      data-callback="onGoogleLogin"
      data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
      data-type="standard"
      data-shape="pill"
      data-theme="filled_black"
      data-text="signin_with"
      data-size="large"
      data-logo_alignment="left"
      data-width="280">
    </div>
  </div>

  <div id="status"></div>

  <div class="divider">or use password</div>

  <div id="manual">
    <div class="field"><label>Username</label><input id="mu" placeholder="Arpit"></div>
    <div class="field"><label>Password</label><input id="mp" type="password" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;"></div>
    <button class="btn" onclick="manualLogin()">Sign In</button>
  </div>
  <span class="toggle" onclick="toggleManual()">Sign in with username &amp; password</span>

  <p class="version">BlueDoor Accounts V3</p>
</div>

<script>
const API = 'https://bluedoor-accounts.info-unikraft.workers.dev/api';

// ── Helpers ───────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  const el = document.getElementById('status');
  if (!type) { el.innerHTML = ''; return; }
  if (type === 'loading') el.innerHTML = '<span class="spin"></span> ' + msg;
  else if (type === 'err')  el.innerHTML = '<span class="err">&#x26A0; ' + msg + '</span>';
  else if (type === 'ok')   el.innerHTML = '<span class="ok">&#x2713; ' + msg + '</span>';
}

function handleSuccess(data) {
  localStorage.setItem('bd_token', data.token);
  localStorage.setItem('bd_user', JSON.stringify(data.user));
  setStatus('Welcome, ' + data.user.username + '!', 'ok');
  setTimeout(function() {
    const role = data.user.role;
    if (role === 'Admin') window.location.href = '/bluedoor-accounts-v3/admin.html';
    else if (role === 'Supervisor') window.location.href = '/bluedoor-accounts-v3/supervisor.html';
    else window.location.href = '/bluedoor-accounts-v3/admin.html';
  }, 600);
}

// ── Google Sign-In callback (must be global) ──────────────────────────────────
function onGoogleLogin(response) {
  setStatus('Signing in with Google...', 'loading');
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'googleLogin', id_token: response.credential })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.ok) { setStatus(data.error || 'Login failed', 'err'); return; }
    handleSuccess(data);
  })
  .catch(function(e) { setStatus('Network error: ' + e.message, 'err'); });
}

// ── Manual login ──────────────────────────────────────────────────────────────
function manualLogin() {
  var u = document.getElementById('mu').value.trim();
  var p = document.getElementById('mp').value;
  if (!u || !p) { setStatus('Enter username and password', 'err'); return; }
  setStatus('Signing in...', 'loading');
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'login', username: u, password: p })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.ok) { setStatus(data.error || 'Invalid credentials', 'err'); return; }
    handleSuccess(data);
  })
  .catch(function(e) { setStatus('Network error: ' + e.message, 'err'); });
}

document.getElementById('mp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') manualLogin();
});

function toggleManual() {
  var f = document.getElementById('manual');
  var showing = f.style.display === 'block';
  f.style.display = showing ? 'none' : 'block';
  document.querySelector('.toggle').textContent = showing
    ? 'Sign in with username & password'
    : 'Hide manual login';
}

// ── Auto-restore valid session ────────────────────────────────────────────────
(function() {
  // ?logout=1 means user explicitly signed out — clear and stay here
  if (window.location.search.indexOf('logout=1') !== -1) {
    localStorage.removeItem('bd_token');
    localStorage.removeItem('bd_user');
    return;
  }

  var token = localStorage.getItem('bd_token');
  if (!token) return;

  setStatus('Checking session...', 'loading');
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Session-Token': token },
    body: JSON.stringify({ action: 'getMe' })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok && data.user) {
      setStatus('Welcome back, ' + data.user.username + '!', 'ok');
      setTimeout(function() {
        window.location.href = data.user.role === 'Admin'
          ? '/bluedoor-accounts-v3/admin.html'
          : '/bluedoor-accounts-v3/app.html';
      }, 600);
    } else {
      localStorage.removeItem('bd_token');
      localStorage.removeItem('bd_user');
      setStatus('', '');
    }
  })
  .catch(function() { setStatus('', ''); });
})();
</script>
</body>
</html>
